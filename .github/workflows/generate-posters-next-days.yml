name: Generar posters next-days

on:
  workflow_dispatch:
    inputs:
      days:
        description: Ventana de dias futuros
        required: false
        default: '4'
      limit:
        description: Numero maximo de carteles
        required: false
        default: '6'

permissions:
  actions: write
  contents: write

concurrency:
  group: github-pages-posters-next-days
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore events data cache
        uses: actions/cache/restore@v4
        with:
          path: cache
          key: events-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            events-data-${{ runner.os }}-

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pillow

      - name: Build static site
        run: npm run build

      - name: Generate posters
        id: generate_posters
        run: >
          python scripts/generate_events_poster.py
          --mode next-days
          --days "${{ inputs.days }}"
          --limit "${{ inputs.limit }}"
          --story-output scratch/posters/proximos-story.png
          --post-output scratch/posters/proximos-post.png
          > poster-result.json

      - name: Read poster result
        id: poster_result
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("poster-result.json").read_text())
          caption = str(payload.get("caption") or "").replace("\n", " ").strip()
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"has_events={'true' if payload['hasEvents'] else 'false'}\n")
              handle.write(f"event_count={payload['eventCount']}\n")
              handle.write(f"caption={caption}\n")
          PY

      - name: Update versioned poster assets
        run: |
          mkdir -p src/posters
          if [ "${{ steps.poster_result.outputs.has_events }}" = "true" ]; then
            cp scratch/posters/proximos-story.png src/posters/proximos-story.png
            cp scratch/posters/proximos-post.png src/posters/proximos-post.png
          fi
          node scripts/write-poster-metadata.mjs \
            --mode next-days \
            --output src/posters/proximos.json \
            --has-events "${{ steps.poster_result.outputs.has_events }}" \
            --event-count "${{ steps.poster_result.outputs.event_count }}" \
            --caption "${{ steps.poster_result.outputs.caption }}" \
            --story-path /posters/proximos-story.png \
            --post-path /posters/proximos-post.png

      - name: Commit updated posters
        id: commit_posters
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/posters
          if git diff --cached --quiet; then
            echo "No poster changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: update next-days posters"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit_posters.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main

      - name: Save events data cache
        uses: actions/cache/save@v4
        with:
          path: cache
          key: events-data-${{ runner.os }}-${{ github.run_id }}
