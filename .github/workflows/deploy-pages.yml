name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      digest: ${{ steps.detect.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore previous signature state
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: .ci-state
          key: events-signature-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            events-signature-${{ runner.os }}-

      - name: Detect event changes
        id: detect
        run: node scripts/check-events-signature.mjs

  build:
    needs: detect-changes
    if: github.event_name != 'schedule' || needs.detect-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Confirm deployed signature state
        run: |
          mkdir -p .ci-state
          printf '%s\n' '${{ needs.detect-changes.outputs.digest }}' > .ci-state/events-signature.txt

      - name: Save deployed signature state
        uses: actions/cache/save@v4
        with:
          path: .ci-state
          key: events-signature-${{ runner.os }}-${{ github.run_id }}
