name: Resincronizar y desplegar Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-manual-resync
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore events data cache
        uses: actions/cache/restore@v4
        with:
          path: cache
          key: events-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            events-data-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Full resync (rebuild cache)
        run: node scripts/sync.mjs --rebuild

      - name: Build static site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Save events data cache
        uses: actions/cache/save@v4
        with:
          path: cache
          key: events-data-${{ runner.os }}-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
